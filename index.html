<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syed Sufiyan — Video Editor</title>
  <meta name="description" content="Portfolio of Syed Sufiyan — a video editor crafting high-retention edits that turn attention into impact.">
  <meta name="theme-color" content="#000000">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
  <div class="messy-gradient"></div>

  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-bar"></div>
      <span class="preloader-text">Loading</span>
    </div>
  </div>

  <!-- Hamburger Menu Button -->
  <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <!-- Side Navigation Overlay -->
  <div class="side-nav-overlay" id="side-nav-overlay"></div>

  <!-- Side Navigation -->
  <nav class="side-nav" id="side-nav">
    <span class="side-nav-label">Navigation</span>
    <a href="#hero" class="side-nav-link" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Home
    </a>
    <a href="#portfolio" class="side-nav-link" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"></polygon>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      Work
    </a>
    <a href="#footer" class="side-nav-link" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
        <path d="M22 4L12 13 2 4"></path>
      </svg>
      Contact
    </a>
    <a href="admin.html" class="side-nav-link accent-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Admin
    </a>
  </nav>

  <!-- Hire Me Sticky Button -->
  <a href="https://forms.gle/Sii5m2E9kDc4S7fX6" target="_blank" rel="noopener" class="hire-me-btn" aria-label="Hire Me">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <span class="hire-me-text">Hire Me</span>
  </a>

  <!-- Background Canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Hero Section -->
    <section class="hero" id="hero">
      <!-- Rendered by JS from config -->
    </section>

    <!-- Top Curve Divider -->
    <div class="curved-divider inward">
      <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
        <defs>
          <linearGradient id="fadeGradientIn" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d3c8" stop-opacity="0" />
            <stop offset="50%" stop-color="#00d3c8" stop-opacity="1" />
            <stop offset="100%" stop-color="#00d3c8" stop-opacity="0" />
          </linearGradient>
        </defs>
        <path d="M0,60 Q600,0 1200,60" fill="none" stroke="url(#fadeGradientIn)" stroke-width="2.5"></path>
      </svg>
    </div>

    <!-- Dynamic Sections Wrapper -->
    <div class="dynamic-sections">
      
      <!-- Section Navigation Tabs -->
      <nav class="section-tabs fade-in-up" id="section-tabs">
        <button class="tab-btn active" data-target="portfolio-view">Portfolio</button>
        <button class="tab-btn" data-target="feedback-view">Testimonials</button>
        <button class="tab-btn" data-target="faqs-view">FAQs</button>
      </nav>
      
      <!-- Portfolio View -->
      <section class="section-view active" id="portfolio-view">

    <!-- Portfolio Section -->
    <section class="portfolio section-content" id="portfolio">
      <!-- Rendered by JS from config -->
    </section>

      </section> <!-- This closes portfolio-view -->

      <!-- Testimonials View -->
      <section class="section-view" id="feedback-view">
        <div class="section-content">
          <p class="section-label fade-in-up">What They Say</p>
          <h2 class="section-title fade-in-up">Client Testimonials</h2>
          <div class="feedback-grid" id="feedback-grid">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

      <!-- FAQs View -->
      <section class="section-view" id="faqs-view">
        <div class="section-content">
          <p class="section-label fade-in-up">Got Questions?</p>
          <h2 class="section-title fade-in-up">FAQs</h2>
          <div class="faq-list" id="faq-list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

    </div>

    <!-- Bottom Curve Divider -->
    <div class="curved-divider outward">
      <svg viewBox="0 0 1200 120" preserveAspectRatio="none" style="transform: rotate(180deg);">
        <defs>
          <linearGradient id="fadeGradientOut" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00d3c8" stop-opacity="0" />
            <stop offset="50%" stop-color="#00d3c8" stop-opacity="1" />
            <stop offset="100%" stop-color="#00d3c8" stop-opacity="0" />
          </linearGradient>
        </defs>
        <path d="M0,60 Q600,0 1200,60" fill="none" stroke="url(#fadeGradientOut)" stroke-width="2.5"></path>
      </svg>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer">
      <!-- Rendered by JS from config -->
    </footer>

  </main>

  <!-- Case Study Modal -->
  <div class="case-study-overlay" id="case-study-modal">
    <div class="case-study-modal">
      <button class="close-case-study" id="close-case-study" aria-label="Close Case Study">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <div class="case-study-scroll-area" id="case-study-content">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js?v=2.1"></script>
  <script src="js/animations.js?v=2.1"></script>
  <script src="js/app.js?v=2.1"></script>

</body>
</html>
